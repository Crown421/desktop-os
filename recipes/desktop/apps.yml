modules:
  - type: dnf
    repos:
      files:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo
        - https://cli.github.com/packages/rpm/gh-cli.repo
        - https://packages.microsoft.com/yumrepos/vscode/config.repo
      copr:
        enable:
          - jdxcode/mise
    install:
      packages:
        - tailscale
        - kitty
        - zsh
        - gh
        - chromium
        - code
        - powertop
        - https://github.com/Crown421/guayusa-wl/releases/download/0.1.3/guayusa-wl-0.1.3-1.x86_64.rpm
        - hunspell-de
        - podman-compose
        - mise
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - hunspell-en
  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.mozilla.firefox
          - com.logseq.Logseq
          - org.zotero.Zotero
          - org.flameshot.Flameshot
          - com.nextcloud.desktopclient.nextcloud
          - org.kde.okular
          - org.gnome.Calculator
          - org.kde.filelight
          - net.lutris.Lutris
        # remove:
        #   - org.gnome.eog
        #   - com.visualstudio.code
        #   - com.bitwarden.desktop
  - type: script
    scripts:
      # - install-mani.sh
      - install-bw.sh
    # user: {} # Also add Flathub user repo, but no user packages
